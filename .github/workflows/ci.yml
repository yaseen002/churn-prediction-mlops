# The name of our workflow (will show up in the GitHub Actions tab)
name: CI Pipeline

# Define WHEN this workflow should run
on:
  push:
    branches: [ "main" ]      # Run on every push to the main branch
  pull_request:
    branches: [ "main" ]      # Run on every Pull Request targeting main

# Define the JOBS (tasks) to run
jobs:
  build-and-test:
    # The environment this runs on (Ubuntu Linux provided by GitHub)
    runs-on: ubuntu-latest

    # The sequential STEPS inside this job
    steps:
      # Step 1: Download your code from GitHub into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install the specific Python version we want
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Step 3: Install our project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest  # Ensure testing/linting tools are present

      # Step 4: Run the Linter
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Run the full linter with our .flake8 config
          flake8 . --count --statistics

      # Step 5: Run the Unit Tests
      - name: Test with pytest
        run: |
          python -m pytest tests/ -v